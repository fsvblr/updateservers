name: Update QuizTools Language Server

on:
  repository_dispatch:
    types: [quiztools_language_updated] # Catches the event

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  update_xml:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update XML and Push with Retry Loop
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          lang="${{ github.event.client_payload.lang }}"
          file_path="quiztools-languages/${lang}.xml"
          
          # Start a cycle of attempts (up to 5 times).
          for i in {1..5}; do
            echo "Attempt $i to process and push changes..."
          
            # Before each Python launch, we forcefully pull the latest repository state from the server.
            git pull origin master --ff-only || git reset --hard origin/master
          
            # Run a sandboxed Python script to modify XML
            python - <<EOF
          import os
          import xml.etree.ElementTree as ET
          from xml.dom import minidom
          
          lang = "${{ github.event.client_payload.lang }}"
          version = "${{ github.event.client_payload.version }}"
          url = "${{ github.event.client_payload.url }}"
          sha256 = "${{ github.event.client_payload.sha256 }}"
          file_path = "${file_path}"
          
          tree = ET.parse(file_path)
          root = tree.getroot()
          
          update_element = root.find('update')
          
          if update_element is not None:
              update_element.find('version').text = version
              update_element.find('downloads').find('downloadurl').text = url
              sha_tag = update_element.find('sha256')
              if sha_tag is not None:
                  sha_tag.text = sha256
              else:
                  new_sha = ET.SubElement(update_element, 'sha256')
                  new_sha.text = sha256
              print(f"Updated entry for {lang} in {file_path}")
          else:
              print(f"Error: <update> tag not found in {file_path}")
              exit(1)
          
          xml_str = ET.tostring(root, encoding='utf-8')
          parsed_str = minidom.parseString(xml_str)
          
          # Format the XML and completely remove the line with the declaration <?xml ... ?>
          lines = [line for line in parsed_str.toprettyxml(indent="    ").splitlines() if line.strip()]
          if lines and lines[0].startswith("<?xml"):
              lines.pop(0)
          
          pretty_xml = "\n".join(lines)
          
          with open(file_path, "w", encoding="utf-8") as f:
              f.write(pretty_xml)
          EOF
          
            # Trying to commit and send the data.
            git add "$file_path"
          
            # Commit only if the file has actually changed.
            if git diff --cached --quiet; then
              echo "No changes detected in XML for $lang. Skipping push."
              exit 0
            fi
          
            git commit -m "Automated update for language: $lang"
          
            # Trying to push WITHOUT a rebase. If the server rejects it (someone managed to intervene), the cycle will go back to the second round.
            if git push origin master; then
              echo "Push successful for $lang on attempt $i!"
              exit 0
            fi
          
            echo "Push rejected. Another workflow updated the XML first. Retrying..."
            # Revert the local commit before the next clean pull attempt.
            git reset --hard HEAD^
            sleep $(( RANDOM % 5 + 2 ))
          done
          
          echo "Failed to apply and push changes for $lang after 5 attempts."
          exit 1
